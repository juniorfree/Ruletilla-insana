<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruletilla Insana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF6EA;
  --paper-soft:#F2E9D7;
  --ink:#2B2118;
  --ink-soft:#7A6A57;
  --ink-faint:#A8967E;
  --red:#B5392C;
  --red-deep:#8E2C22;
  --green:#1F4D3A;
  --green-deep:#143628;
  --gold:#C5972F;
  --gold-soft:#E4C77E;
  --line:#D9C8A6;
  --line-strong:#C2AD86;
  --radius:8px;
  --font-display:'Fraunces', serif;
  --font-sans:'Inter', system-ui, sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{height:100%;}

body{
  font-family:var(--font-sans);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:48px 16px;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.06) 0%, transparent 45%),
    radial-gradient(circle at 50% 110%, var(--green) 0%, var(--green-deep) 55%, #0D2419 100%);
  -webkit-font-smoothing:antialiased;
}

*:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}

.phone{
  background:var(--paper);
  border-radius:18px;
  overflow:hidden;
  max-width:380px;
  width:100%;
  box-shadow:0 30px 70px -20px rgba(0,0,0,.55), 0 0 0 1px rgba(0,0,0,.06);
  position:relative;
}

.topbar{
  background:linear-gradient(160deg, var(--green) 0%, var(--green-deep) 100%);
  padding:20px 18px 26px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:relative;
}
.topbar::after{
  content:"";
  position:absolute;left:0;right:0;bottom:-1px;height:13px;
  background:
    linear-gradient(135deg, var(--green-deep) 50%, transparent 50%),
    linear-gradient(45deg, var(--green-deep) 50%, transparent 50%);
  background-size:13px 13px;
  background-position:0 0, 6.5px 0;
  background-repeat:repeat-x;
}
.topbar-title{
  font-family:var(--font-display);
  font-weight:800;
  font-size:23px;
  color:var(--paper);
  letter-spacing:.01em;
}
.topbar-sub{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--gold-soft);
  margin-top:3px;
  letter-spacing:.03em;
}
.reset-btn{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  border-radius:50%;
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  color:var(--paper);
  cursor:pointer;
  transition:background .15s, transform .4s;
}
.reset-btn:hover{background:rgba(255,255,255,.16);}
.reset-btn:active svg{transform:rotate(-50deg);}
.reset-btn svg{transition:transform .4s;}

.body{padding:20px 18px 18px;}

.wheel-wrap{
  position:relative;
  width:212px;height:212px;
  margin:4px auto 14px;
  filter:drop-shadow(0 14px 22px rgba(43,33,24,.25));
}
.wheel-medallion{
  position:absolute;
  top:-7px;left:-7px;right:-7px;bottom:-7px;
  border-radius:50%;
  background:var(--paper);
  box-shadow:0 0 0 1px var(--line-strong), 0 0 0 5px var(--paper), 0 0 0 6px var(--gold-soft);
}
.needle{
  position:absolute;
  top:-3px;left:50%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:20px solid var(--gold);
  z-index:10;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.35));
}
canvas#wh{display:block;position:relative;z-index:2;}

.status-pill{text-align:center;margin-bottom:14px;min-height:24px;}
.pill{
  display:inline-block;
  padding:5px 16px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  letter-spacing:.02em;
  background:var(--paper-soft);
  color:var(--ink-soft);
  border:1px solid var(--line);
}
.pill.warn{background:#F4DCD4;color:var(--red-deep);border-color:#E3B6A8;}
.pill.ok{background:#DCE9DD;color:var(--green);border-color:#B9D2BC;}

.spin-btn{
  width:100%;height:46px;
  border-radius:var(--radius);
  border:1px solid var(--gold);
  background:linear-gradient(160deg, var(--red) 0%, var(--red-deep) 100%);
  color:var(--paper);
  font-size:14px;
  font-weight:700;
  font-family:var(--font-sans);
  letter-spacing:.07em;
  text-transform:uppercase;
  cursor:pointer;
  margin-bottom:18px;
  box-shadow:0 6px 14px -4px rgba(142,44,34,.55);
  transition:opacity .15s, transform .1s;
}
.spin-btn:hover:not(:disabled){transform:translateY(-1px);}
.spin-btn:active:not(:disabled){transform:translateY(0);}
.spin-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}

.section-label{
  font-size:10.5px;
  font-weight:700;
  color:var(--ink-faint);
  letter-spacing:.09em;
  text-transform:uppercase;
  margin-bottom:7px;
  font-family:var(--font-mono);
}

textarea#pnames{
  width:100%;height:108px;
  border-radius:var(--radius);
  border:1px dashed var(--line-strong);
  background:var(--paper-soft);
  color:var(--ink);
  padding:10px 12px;
  font-size:13.5px;
  font-family:var(--font-sans);
  resize:none;
  line-height:1.65;
}
textarea#pnames:focus{outline:none;border-color:var(--gold);border-style:solid;background:var(--paper);}

.divider{
  border:none;
  border-top:1.5px dashed var(--line-strong);
  margin:16px 0;
  position:relative;
}

.nums-wrap{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:10px;max-height:78px;overflow-y:auto;
  padding-right:2px;
}
.nums-wrap::-webkit-scrollbar{width:5px;}
.nums-wrap::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:4px;}

.nc{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  font-family:var(--font-mono);
  cursor:pointer;
  background:var(--paper);
  color:var(--green);
  border:1px solid var(--green);
  transition:background .15s, color .15s;
}
.nc:hover{background:var(--green);color:var(--paper);}
.nc.used{
  background:transparent;
  color:var(--ink-faint);
  border-color:var(--line);
  text-decoration:line-through;
  cursor:default;
}
.nc.used:hover{background:transparent;color:var(--ink-faint);}

.row-input{display:flex;gap:7px;margin-bottom:4px;}
.row-input input{
  flex:1;height:36px;
  border-radius:var(--radius);
  border:1px solid var(--line-strong);
  background:var(--paper-soft);
  color:var(--ink);
  padding:0 11px;
  font-size:13px;
  font-family:var(--font-sans);
}
.row-input input:focus{outline:none;border-color:var(--gold);background:var(--paper);}
.row-input input::placeholder{color:var(--ink-faint);}
.row-input button{
  height:36px;padding:0 16px;
  border-radius:var(--radius);
  border:1px solid var(--green);
  background:var(--green);
  color:var(--paper);
  font-size:12.5px;
  font-weight:600;
  letter-spacing:.02em;
  font-family:var(--font-sans);
  cursor:pointer;
  transition:opacity .15s;
}
.row-input button:hover{opacity:.88;}

.result-box{
  background:var(--paper-soft);
  border:1px dashed var(--line-strong);
  border-radius:var(--radius);
  padding:12px 12px 10px;
  margin-top:12px;
}
.result-box pre{
  font-family:var(--font-mono);
  font-size:12.5px;
  color:var(--ink);
  white-space:pre-wrap;
  line-height:1.7;
}
.copy-btn{
  margin-top:10px;width:100%;height:34px;
  border-radius:var(--radius);
  border:1px solid var(--line-strong);
  background:transparent;
  color:var(--ink-soft);
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  font-family:var(--font-sans);
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .15s;
}
.copy-btn:hover{background:var(--paper);}
.copy-btn svg{flex-shrink:0;}
</style>
</head>
<body>

<div class="phone">
  <div class="topbar">
    <div>
      <div class="topbar-title">Ruleta-Rifas Calzadas</div>
      <div class="topbar-sub" id="tb-sub">31 números · 0 personas</div>
    </div>
    <button class="reset-btn" onclick="resetAll()" title="Reiniciar" aria-label="Reiniciar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
    </button>
  </div>

  <div class="body">
    <div class="wheel-wrap">
      <div class="wheel-medallion"></div>
      <div class="needle"></div>
      <canvas id="wh" width="212" height="212"></canvas>
    </div>

    <div class="status-pill"><span class="pill" id="spill">Listo para girar</span></div>
    <button class="spin-btn" id="spin-btn" onclick="spinNext()">Girar</button>

    <div class="section-label">Personas</div>
    <textarea id="pnames">Junior
Daniel
Edson
Papo
Yerson
Diego
Evans
Francisco
Jona
Mateo
Evan</textarea>

    <div class="divider"></div>

    <div class="section-label">Números — toca para eliminar</div>
    <div class="nums-wrap" id="ngrid"></div>
    <div class="row-input">
      <input type="number" id="nval" placeholder="Agregar número..."/>
      <button onclick="addNum()">Agregar</button>
    </div>

    <div id="result-box" class="result-box" style="display:none">
      <pre id="result-text"></pre>
      <button class="copy-btn" onclick="copyRes()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copiar resultado
      </button>
    </div>
  </div>
</div>

<script>
const COPY_DEFAULT_HTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar resultado';

const DEFAULT_PEOPLE=['Junior','Daniel','Edson','Papo','Yerson','Diego','Evans','Francisco','Jona','Mateo','Evan'];
let allNums=Array.from({length:31},(_,i)=>i+1);
let usedNums=new Set();
let people=[];
let assignments={};
let queue=[];
let spinning=false;
let angle=0;
let debounceTimer=null;

const COLS=['#534AB7','#1D9E75','#D85A30','#185FA5','#BA7517','#993556','#639922','#A32D2D','#0F6E56','#3C3489','#5DCAA5','#EF9F27'];

function availNums(){return allNums.filter(n=>!usedNums.has(n));}

function drawWheel(hi){
  const cv=document.getElementById('wh'),ctx=cv.getContext('2d');
  const W=212,cx=W/2,cy=W/2,r=W/2-3;
  ctx.clearRect(0,0,W,W);
  const pool=availNums();
  if(!pool.length){
    ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);
    ctx.fillStyle='#FBF6EA';ctx.fill();
    ctx.fillStyle='#A8967E';ctx.font='13px Inter, sans-serif';ctx.textAlign='center';
    ctx.fillText('Sin números',cx,cy+4);
    return;
  }
  const sl=(2*Math.PI)/pool.length;
  pool.forEach((n,i)=>{
    const s=angle+i*sl-Math.PI/2,e=s+sl;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=hi===i?'#E4C77E':COLS[i%COLS.length];ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.stroke();
    if(pool.length<=40){
      ctx.save();ctx.translate(cx,cy);ctx.rotate(s+sl/2);
      ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='bold 11px Inter, sans-serif';
      ctx.fillText(n,r-5,4);ctx.restore();
    }
  });
  ctx.beginPath();ctx.arc(cx,cy,14,0,2*Math.PI);
  ctx.fillStyle='#FBF6EA';ctx.fill();
  ctx.strokeStyle='#C2AD86';ctx.lineWidth=1;ctx.stroke();
}

function renderNums(){
  document.getElementById('ngrid').innerHTML=allNums.map(n=>`<span class="nc${usedNums.has(n)?' used':''}" onclick="${usedNums.has(n)?'':'removeNum('+n+')'}">${n}</span>`).join('');
  document.getElementById('tb-sub').textContent=`${availNums().length} números · ${people.length} personas`;
}

function addNum(){
  const i=document.getElementById('nval'),v=parseInt(i.value);
  if(!isNaN(v)&&!allNums.includes(v)){allNums.push(v);allNums.sort((a,b)=>a-b);renderNums();drawWheel();}
  i.value='';
}
function removeNum(n){allNums=allNums.filter(x=>x!==n);usedNums.delete(n);renderNums();drawWheel();}

function syncFromTextarea(){
  const raw=document.getElementById('pnames').value;
  const names=raw.split('\n').map(s=>s.trim()).filter(s=>s.length>0);
  people=[...names];
  assignments={};
  usedNums=new Set();
  people.forEach(p=>assignments[p]=[]);
  // Cola: Junior #1, Junior #2, Daniel #1, Daniel #2, Edson #1, Edson #2 ...
  queue=[];
  people.forEach(p=>{
    queue.push({p,r:1});
    queue.push({p,r:2});
  });
  renderNums();drawWheel();
  document.getElementById('result-box').style.display='none';
  document.getElementById('spin-btn').disabled=!people.length||!availNums().length;
  document.getElementById('spin-btn').textContent='Girar';
  setStatus(people.length?'Listo para girar':'Agrega personas para comenzar','');
  document.getElementById('tb-sub').textContent=`${availNums().length} números · ${people.length} personas`;
}

function resetAll(){
  allNums=Array.from({length:31},(_,i)=>i+1);
  document.getElementById('pnames').value=DEFAULT_PEOPLE.join('\n');
  document.getElementById('result-box').style.display='none';
  syncFromTextarea();
}

function setStatus(txt,cls){
  const el=document.getElementById('spill');
  el.className='pill '+(cls||'');el.textContent=txt;
}

function spinNext(){
  if(spinning)return;
  if(!people.length){setStatus('Escribe personas primero','warn');return;}
  if(!queue.length){showResult();return;}
  if(!availNums().length){setStatus('Sin números disponibles','warn');return;}

  const {p,r}=queue.shift();
  setStatus(`${p} — número ${r}`,'');
  document.getElementById('spin-btn').disabled=true;

  const pool=availNums();
  const win=pool[Math.floor(Math.random()*pool.length)];
  const winIdx=pool.indexOf(win);
  const sl=(2*Math.PI)/pool.length;
  const target=-winIdx*sl-sl/2+Math.PI*2*6+(Math.random()*.5-.25)*sl;
  const dur=2800+Math.random()*900;
  const t0=performance.now(),a0=angle;
  spinning=true;

  function anim(now){
    const t=Math.min((now-t0)/dur,1);
    const ease=1-Math.pow(1-t,3);
    angle=a0+target*ease;
    const idx=Math.floor((((-angle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI))/sl)%pool.length;
    drawWheel(idx);
    if(t<1){requestAnimationFrame(anim);}
    else{
      spinning=false;
      assignments[p].push(win);
      usedNums.add(win);
      renderNums();
      setStatus(`¡${p} obtuvo el ${win}!`,'ok');
      const btn=document.getElementById('spin-btn');
      btn.disabled=false;
      btn.textContent=queue.length?'Girar':'Ver resultado final';
      drawWheel();
    }
  }
  requestAnimationFrame(anim);
}

function showResult(){
  const txt=people.map(p=>`${p}: ${(assignments[p]||[]).join(' y ')}`).join('\n');
  document.getElementById('result-text').textContent=txt;
  document.getElementById('result-box').style.display='block';
  setStatus('¡Todos tienen sus números!','ok');
  document.getElementById('spin-btn').disabled=true;
}

function copyRes(){
  navigator.clipboard.writeText(document.getElementById('result-text').textContent).catch(()=>{});
  const b=document.querySelector('.copy-btn');b.textContent='¡Copiado!';
  setTimeout(()=>b.innerHTML=COPY_DEFAULT_HTML,1500);
}

document.getElementById('pnames').addEventListener('input',()=>{
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(syncFromTextarea,600);
});

syncFromTextarea();
</script>
</body>
</html>
